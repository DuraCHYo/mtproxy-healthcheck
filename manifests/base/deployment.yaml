apiVersion: apps/v1
kind: Deployment
metadata:
  name: mtproxy-validator
spec:
  selector:
    matchLabels:
      app: mtproxy-validator
  template:
    metadata:
      labels:
        app: mtproxy-validator
    spec:
      containers:
        - name: mtproxy-validator
          image: ghcr.io/durachyo/mtproxy-validator
          envFrom:
            - secretRef:
                name: tgapi-developer-token
          resources:
            limits:
              memory: '128Mi'
              cpu: '50m'
            requests:
              memory: '96Mi'
              cpu: '20m'
          ports:
            - containerPort: 8000
