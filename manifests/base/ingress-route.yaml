apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mtproxy-validator
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`mtproxy.lab.local`)
      priority: 10
      services:
        - name: mtproxy-validator
          port: 80
  tls:
    certResolver: default
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mtproxy-validator-redirect
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`mtproxy.lab.local`)
      middlewares:
        - name: redirect-to-https
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
spec:
  redirectScheme:
    scheme: https
    permanent: true
