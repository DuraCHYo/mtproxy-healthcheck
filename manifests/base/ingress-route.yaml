apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mtproxy-healthcheck
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`mtproxy.lab.local`)
      priority: 10
      services:
        - name: mtproxy-healthcheck
          port: 80
  tls: {}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mtproxy-healthcheck-redirect
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`mtproxy.lab.local`)
      middlewares:
        - name: redirect-to-https
  tls: {}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
spec:
  redirectScheme:
    scheme: https
    permanent: true
